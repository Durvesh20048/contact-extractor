<!DOCTYPE html>
<html>
<head>
    <title>Contact Extractor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #121212;
            color: #eaeaea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 520px;
            padding: 30px;
            border-radius: 12px;
            background: #1e1e1e;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            color: #d4af37; /* subtle gold */
        }

        .file-box {
            text-align: center;
            margin-bottom: 15px;
        }

        input[type="file"] {
            color: #ccc;
        }

        button {
            display: block;
            margin: 15px auto;
            padding: 10px 25px;
            background: #d4af37;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            background: #c19b2e;
        }

        .card {
            background: #2a2a2a;
            padding: 14px;
            margin: 12px 0;
            border-radius: 6px;
            border-left: 3px solid #d4af37;
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            background: #333;
        }

        .label {
            font-weight: 500;
            color: #d4af37;
            margin-bottom: 5px;
        }

        .value {
            font-size: 14px;
            color: #ddd;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Contact Information Extractor</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="file-box">
            <input type="file" name="file" required>
        </div>

        <button type="submit">Extract</button>

    </form>

    {% if result %}
    
    <div class="card">
        <div class="label">Name</div>
        <div class="value">{{ result.name | join(', ') }}</div>
    </div>

    <div class="card">
        <div class="label">Email</div>
        <div class="value">{{ result.email | join(', ') }}</div>
    </div>

    <div class="card">
        <div class="label">Phone</div>
        <div class="value">{{ result.phone | join(', ') }}</div>
    </div>

    <div class="card">
        <div class="label">Location</div>
        <div class="value">{{ result.location | join(', ') }}</div>
    </div>

    <div class="card">
        <div class="label">Links</div>
        <div class="value">{{ result.links | join(', ') }}</div>
    </div>

    {% endif %}

</div>

</body>
</html>
